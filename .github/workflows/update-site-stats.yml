name: Update Site Stats

on:
  schedule:
    - cron: "15 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Update stats snapshot
        env:
          SITE_URL: https://idcm-svg.github.io/HFTTC.github.io/
        run: node .github/scripts/update-site-stats.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/site-stats.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update site stats"
          git push
